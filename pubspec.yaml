name: offline_ocr_app
description: "A premium offline OCR Android application built with Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_mlkit_text_recognition: ^0.14.0
  image_picker: ^1.1.2
  image_cropper: ^7.0.0
  flutter_riverpod: ^2.5.1
  hive_flutter: ^1.1.0
  google_fonts: ^6.2.1
  flutter_tts: ^4.0.2
  share_plus: ^10.0.0
  animations: ^2.0.11
  path_provider: ^2.1.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    # We will use system/vector icons, but configuring assets section just in case
    # - assets/
